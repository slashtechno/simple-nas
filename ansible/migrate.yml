---
# One-shot migration playbook: stops the legacy monolithic compose stack,
# then deploys the new per-service structure via site.yml.
#
# Safe to re-run. Data directories are unchanged — only the compose project
# layout moves from ~/simple-nas/ to /opt/nas/<service>/.
#
# Usage:
#   ansible-playbook migrate.yml
#
# To keep the old stack running in parallel (test new setup first):
#   ansible-playbook site.yml        # bring up new stack
#   # verify everything works
#   ansible-playbook migrate.yml     # stop old stack

- name: Stop legacy compose stack
  hosts: nas
  become: true

  vars:
    legacy_dir: "/home/{{ ansible_user }}/simple-nas"

  tasks:
    - name: Check if legacy docker-compose.yml exists
      ansible.builtin.stat:
        path: "{{ legacy_dir }}/docker-compose.yml"
      register: legacy_compose

    - name: Stop legacy stack (if present)
      ansible.builtin.command:
        cmd: docker compose down
        chdir: "{{ legacy_dir }}"
      when: legacy_compose.stat.exists
      changed_when: true

    - name: Archive legacy directory
      ansible.builtin.archive:
        path: "{{ legacy_dir }}"
        dest: "{{ legacy_dir }}-backup-{{ ansible_date_time.date }}.tar.gz"
        format: gz
      when: legacy_compose.stat.exists

- name: Deploy new stack
  ansible.builtin.import_playbook: "{{ playbook_dir }}/site.yml"
