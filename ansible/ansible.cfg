[defaults]
# roles_path: ~/.ansible/roles = Galaxy-installed roles (not committed to git)
#             roles             = our custom roles (committed to git)
# Ansible searches left to right when resolving a role name.
roles_path = ~/.ansible/roles:roles

# remote_user is intentionally NOT set here.
# Set ansible_user per host in inventory/hosts.yml — Pi OS forces a custom username on first boot.

inventory = inventory/hosts.yml
host_key_checking = False
stdout_callback = default
result_format = yaml
collections_path = ~/.ansible/collections

[privilege_escalation]
# Every task runs as root via sudo — you never see sudo in task files.
become = True
become_method = sudo
