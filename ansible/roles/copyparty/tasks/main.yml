---
- name: Create Copyparty compose directory
  ansible.builtin.file:
    path: "{{ nas_base_dir }}/copyparty"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Copy Docker build files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ nas_base_dir }}/copyparty/{{ item.dest }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "{{ item.mode }}"
  loop:
    - { src: Dockerfile, dest: Dockerfile, mode: "0644" }
    - { src: entrypoint.sh, dest: entrypoint.sh, mode: "0755" }

- name: Render full copyparty config directly (no runtime sed processing)
  ansible.builtin.template:
    src: copyparty.conf.j2
    dest: "{{ copyparty_config_dir }}/copyparty.conf"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  notify: Restart Copyparty

- name: Render Copyparty docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nas_base_dir }}/copyparty/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"
  notify: Restart Copyparty

- name: Build and start Copyparty
  community.docker.docker_compose_v2:
    project_src: "{{ nas_base_dir }}/copyparty"
    state: present
    build: always
