---
- name: Create Gitea compose directory
  ansible.builtin.file:
    path: "{{ nas_base_dir }}/gitea"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Render Gitea docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ nas_base_dir }}/gitea/docker-compose.yml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0640"
  notify: Restart Gitea

- name: Start Gitea
  community.docker.docker_compose_v2:
    project_src: "{{ nas_base_dir }}/gitea"
    state: present
    pull: missing
